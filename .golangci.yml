version: "2"
issues:
  max-same-issues: 50

formatters:
  enable:
    - golines
    - gofumpt
  settings:
    golines:
      max-len: 200
      tab-len: 8
      shorten-comments: true
      reformat-tags: false
      chain-split-dots: false

linters:
  # If desired, uncomment disable-all: true and enable only the below.
  # disable-all: true
  disable:
    - errcheck
    - wrapcheck
    - exhaustruct
    - exhaustive
    - revive
    - gosec
    - paralleltest
  enable:
    - govet
    - staticcheck
    # - errcheck         # requires checked errors everywhere
    - ineffassign
    - errorlint
    # - wrapcheck        # requires wrapping errors
    - predeclared
    - unused
    - unparam
    - bodyclose
    - sqlclosecheck
    - copyloopvar
    - gocognit
    - funlen
    - gocyclo
    - cyclop
    # - exhaustive       # requires exhaustive switch/map cases
    # - exhaustruct      # requires all struct fields initialized
    - gochecksumtype
    # - revive           # requires doc comments on exports
    - godot
    - nolintlint
    - testableexamples
    - testifylint
    - testpackage
    - nosprintfhostport
    - tagalign
    - musttag
    - tagliatelle
    - depguard
    - importas
    - gomoddirectives
    - exptostd
    # - gosec            # security checks (G104, etc)
    - bidichk
    - asciicheck
    - forbidigo
    - loggercheck
    - sloglint
    - promlinter
    - perfsprint
    - prealloc
    - wastedassign
    - tparallel
    # - paralleltest     # requires t.Parallel in all test functions
    - gocritic
    - makezero
    - nestif
    - whitespace
    - nonamedreturns
    - nakedret
    - mnd
    - spancheck
    - funcorder
    - protogetter
    - recvcheck
    - rowserrcheck
    - unconvert
    - usestdlibvars
    - usetesting
    - durationcheck
    - dupl
    - errname
    - iface
    - intrange
    - mirror
    - reassign

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0
    depguard:
      rules:
        "deprecated":
          files:
            - "$all"
          deny:
            - pkg: github.com/golang/protobuf
              desc: Use google.golang.org/protobuf instead, see https://developers.google.com/protocol-buffers/docs/reference/go/faq#modules
            - pkg: github.com/satori/go.uuid
              desc: Use github.com/google/uuid instead, satori's package is not maintained
            - pkg: github.com/gofrs/uuid$
              desc: Use github.com/gofrs/uuid/v5 or later, it was not a go module before v5
        "non-test files":
          files:
            - "!$test"
          deny:
            - pkg: math/rand$
              desc: Use math/rand/v2 instead, see https://go.dev/blog/randv2
        "non-main files":
          files:
            - "!**/main.go"
          deny:
            - pkg: log$
              desc: Use log/slog instead, see https://go.dev/blog/slog
    # errcheck:
    #   check-type-assertions: true
    # exhaustive:
    #   check: [switch, map]
    # exhaustruct:
    #   exclude:
    #     - ^net/http.Client$
    #     - ^net/http.Cookie$
    #     - ^net/http.Request$
    #     - ^net/http.Response$
    #     - ^net/http.Server$
    #     - ^net/http.Transport$
    #     - ^net/url.URL$
    #     - ^os/exec.Cmd$
    #     - ^reflect.StructField$
    #     - ^github.com/Shopify/sarama.Config$
    #     - ^github.com/Shopify/sarama.ProducerMessage$
    #     - ^github.com/mitchellh/mapstructure.DecoderConfig$
    #     - ^github.com/prometheus/client_golang/.+Opts$
    #     - ^github.com/spf13/cobra.Command$
    #     - ^github.com/spf13/cobra.CompletionOptions$
    #     - ^github.com/stretchr/testify/mock.Mock$
    #     - ^github.com/testcontainers/testcontainers-go.+Request$
    #     - ^github.com/testcontainers/testcontainers-go.FromDockerfile$
    #     - ^golang.org/x/tools/go/analysis.Analyzer$
    #     - ^google.golang.org/protobuf/.+Options$
    #     - ^gopkg.in/yaml.v3.Node$
    funcorder:
      struct-method: false
    funlen:
      lines: 100
      statements: 50
    gochecksumtype:
      default-signifies-exhaustive: false
    gocognit:
      min-complexity: 20
    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false
    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true
    inamedparam:
      skip-single-param: true
    mnd:
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets.*
        - prometheus.LinearBuckets
    nakedret:
      max-func-lines: 0
    nolintlint:
      allow-no-explanation: [ funlen, gocognit, golines ]
      require-explanation: true
      require-specific: true
    perfsprint:
      strconcat: false
    reassign:
      patterns:
        - ".*"
    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx
    sloglint:
      no-global: all
      context: scope
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1016
        - -QF1008
    usetesting:
      os-temp-dir: true