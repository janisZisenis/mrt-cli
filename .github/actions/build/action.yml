name: 'Build'
description: 'Build binaries for all platforms'
runs:
  using: 'composite'
  steps:
    - uses: ./.github/actions/setup-mrt
    - uses: ./.github/actions/setup-go
    - uses: ./.github/actions/setup-goreleaser
    - name: Build binaries
      shell: bash
      run: mrt run build -- --all
    - name: Upload dist
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 7
