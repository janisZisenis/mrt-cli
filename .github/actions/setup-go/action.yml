name: 'Setup Go'
description: 'Setup Go with caching'
inputs:
  go-version:
    description: 'The Go version to install'
    required: false
    default: '1.24.5'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true
        cache-dependency-path: |
          app/go.sum
          e2e-tests/go.sum