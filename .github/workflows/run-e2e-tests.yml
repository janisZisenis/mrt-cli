name: Run E2E Tests

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check-bash:
    name: Check Bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-mrt
      - uses: ./.github/actions/setup-shell-utilities
      - name: Check bash formatting and linting
        run: mrt run check-bash
  check-go:
    name: Check Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-mrt
      - uses: ./.github/actions/setup-go-utilities
      - name: Check Go formatting and linting
        run: mrt run check-go
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/build
  run-linux-tests:
    name: Run tests on linux
    runs-on: ubuntu-latest
    needs: [build, check-bash, check-go]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/run-tests
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
  run-darwin-tests:
    name: Run tests on darwin
    runs-on: macos-15
    needs: [build, check-bash, check-go]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go
      - name: Setup bash
        shell: bash
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install bash
      - uses: ./.github/actions/run-tests
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [run-linux-tests, run-darwin-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/setup-goreleaser
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
